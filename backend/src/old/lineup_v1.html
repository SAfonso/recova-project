<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ event_title }}</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #040409;
        --bg-1: #101127;
        --bg-2: #241038;
        --accent-cyan: #53ebff;
        --accent-pink: #ff4fb9;
        --accent-purple: #a78bff;
        --text-main: #f8f9ff;
        --text-soft: #d4dbff;
        --text-muted: #98a4df;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        font-family: Montserrat, "Segoe UI", Arial, sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(circle at 14% 18%, rgba(83, 235, 255, 0.22), transparent 44%),
          radial-gradient(circle at 90% 82%, rgba(255, 79, 185, 0.2), transparent 44%),
          linear-gradient(140deg, var(--bg-0) 0%, var(--bg-1) 48%, var(--bg-2) 100%);
      }
      .poster {
        width: 100%;
        height: 100%;
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 20px;
        padding: 64px 66px 58px;
        background: linear-gradient(180deg, rgba(7, 8, 20, 0.5), rgba(4, 4, 12, 0.85));
      }
      .subtitle {
        text-transform: uppercase;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.18em;
        color: var(--text-muted);
      }
      h1 {
        margin: 0;
        font-family: "Bebas Neue", Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
        font-size: 132px;
        letter-spacing: 0.05em;
        line-height: 0.88;
        text-shadow:
          0 0 14px rgba(83, 235, 255, 0.38),
          0 0 36px rgba(255, 79, 185, 0.3);
      }
      .meta {
        margin-top: 8px;
        display: flex;
        gap: 12px;
        align-items: center;
        color: var(--text-soft);
        font-size: 24px;
        font-weight: 600;
      }
      .meta .dot {
        color: rgba(167, 139, 255, 0.9);
      }
      .slots {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        align-content: start;
      }
      .slot {
        min-height: 128px;
        border-radius: 14px;
        padding: 15px 18px;
        border: 1px solid rgba(167, 139, 255, 0.3);
        background: linear-gradient(145deg, rgba(34, 20, 63, 0.82), rgba(12, 22, 50, 0.9));
        box-shadow:
          inset 0 0 0 1px rgba(83, 235, 255, 0.14),
          0 10px 26px rgba(2, 4, 18, 0.5);
      }
      .order {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.11em;
        text-transform: uppercase;
        color: #aeb8f8;
      }
      .name {
        margin-top: 6px;
        font-family: "Bebas Neue", Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
        font-size: 42px;
        line-height: 0.95;
        letter-spacing: 0.03em;
        color: var(--text-main);
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
      }
      .instagram {
        margin-top: 6px;
        font-size: 17px;
        font-weight: 700;
        color: var(--accent-cyan);
      }
    </style>
  </head>
  <body>
    <main class="poster">
      <div class="subtitle">{{ event_title }}</div>
      <section>
        <h1>LINEUP</h1>
        <div class="meta">
          <span>{{ event_date }}</span>
          {% if event_venue %}
          <span class="dot">•</span>
          <span>{{ event_venue }}</span>
          {% endif %}
        </div>
      </section>
      <section class="slots">
        {% for comic in lineup_slots %}
        <article class="slot">
          <div class="order">Slot {{ comic.order }}</div>
          <div class="name">{{ comic.name or "Próximamente" }}</div>
          <div class="instagram">{{ "@" + comic.instagram if comic.instagram else "" }}</div>
        </article>
        {% endfor %}
      </section>
    </main>
  </body>
</html>
