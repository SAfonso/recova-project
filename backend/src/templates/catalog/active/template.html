<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

        :root {
            --bg-red: #e61d2b;
            --accent-yellow: #fff200;
            --text-white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1350px;
            background: #e61d2b;
            font-family: 'Bebas Neue', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Ráfagas de cómic en las esquinas */
        .burst {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--accent-yellow);
            clip-path: polygon(0% 0%, 100% 0%, 0% 100%);
            z-index: 1;
        }

        .header {
            margin-top: 50px;
            font-size: 220px;
            color: var(--text-white);
            text-align: right;
            width: 90%;
            line-height: 0.8;
            transform: skew(-5deg) rotate(-2deg);
            -webkit-text-stroke: 8px black;
            z-index: 10;
        }

        .main-container {
            display: flex;
            width: 100%;
            height: 60%;
            position: relative;
            z-index: 5;
        }

        .microphone-silhouette {
            width: 100px;
            height: 100px;
            background: black;
            border-radius: 50%;
            margin: auto;
        }

        .lineup {
            width: 50%;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            transform: skew(-5deg);
        }

        .comico {
            font-size: 60px;
            color: var(--text-white);
            -webkit-text-stroke: 4px black;
            text-shadow: 8px 8px 0px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        .footer {
            position: absolute;
            bottom: 50px;
            font-size: 180px;
            color: var(--text-white);
            -webkit-text-stroke: 6px black;
            transform: rotate(-3deg);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="burst"></div>
    <div class="header">RECOVA<br>MIC</div>
    
    <div class="main-container">
        <div class="microphone-silhouette"></div>
        <div class="lineup">
            {% for comico in lineup %}
            <div class="comico">{{ comico.name }}</div>
            {% endfor %}
        </div>
    </div>

    <div class="footer">{{ event.date }}</div>
</body>
</html>
