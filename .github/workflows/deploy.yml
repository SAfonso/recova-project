name: Deploy to Hetzner (dev)

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export PATH=$PATH:/usr/bin:/usr/local/bin
            cd /root/RECOVA
            git pull origin dev
            ./venv/bin/pip install -r requirements.txt
            # Usamos la ruta completa por si acaso
            $(which pm2) restart webhook-ingesta || $(which pm2) start /root/RECOVA/backend/src/triggers/webhook_listener.py --name "webhook-ingesta" --interpreter /root/RECOVA/venv/bin/python3
