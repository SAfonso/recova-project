name: Deploy to Hetzner (dev)

on:
  push:
    branches:
      - dev
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
              set -euo pipefail
              export PATH=$PATH:/usr/bin:/usr/local/bin
              cd /root/RECOVA

              # Forzamos la URL de origen a HTTPS usando el Token para no depender de SSH ni de contraseñas
              git remote set-url origin https://${{ secrets.GH_TOKEN }}@github.com/SAfonso/recova-project.git

              git fetch origin dev
              git reset --hard origin/dev
              ./venv/bin/pip install -r requirements.txt

              # 1. Ejecutamos la suite real del backend antes de reiniciar servicios.
              ./venv/bin/python3 -m pytest -q backend/tests && \

              # 2. Parar PM2 si sigue corriendo (migración a Docker — puerto 5000)
              pm2 stop webhook-ingesta 2>/dev/null || true && \
              pm2 delete webhook-ingesta 2>/dev/null || true && \

              # 3. Solo si pytest es exitoso, rebuild y reinicio del container.
              docker compose down && \
              docker compose up -d --build
